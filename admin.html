<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями — Админ-панель</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e27">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body { padding-top: 100px; }
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }
        .admin-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .admin-card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #00e67a;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label {
            font-size: 0.85rem;
            color: rgba(232,237,243,0.6);
        }
        .form-group input, .form-group select {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #e8edf3;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #00e67a;
        }
        .form-group select option { background: #1a1e24; color: #e8edf3; }
        .btn-action {
            display: inline-block;
            background: #00e67a;
            color: #0a0c0f;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-action:hover { box-shadow: 0 0 20px rgba(0,230,122,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: #e8edf3;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .btn-secondary:hover { border-color: #00ccff; color: #00ccff; }
        .btn-danger {
            background: rgba(255,82,82,0.1);
            color: #ff5252;
            border: 1px solid rgba(255,82,82,0.3);
        }
        .btn-danger:hover { background: rgba(255,82,82,0.2); }
        .btn-export {
            background: rgba(0,204,255,0.1);
            color: #00ccff;
            border: 1px solid rgba(0,204,255,0.3);
        }
        .btn-export:hover { background: rgba(0,204,255,0.2); }
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        .users-table th {
            text-align: left;
            font-size: 0.8rem;
            color: rgba(232,237,243,0.5);
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-weight: 600;
            white-space: nowrap;
        }
        .users-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.85rem;
            vertical-align: middle;
        }
        .users-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .type-badge.admin { background: rgba(0,204,255,0.15); color: #00ccff; }
        .type-badge.full { background: rgba(0,230,122,0.15); color: #00e67a; }
        .type-badge.lesson { background: rgba(255,193,7,0.15); color: #ffc107; }
        .status-active { color: #00e67a; font-size: 0.8rem; }
        .status-deactivated { color: #ff5252; font-size: 0.8rem; }
        .progress-bar {
            width: 60px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }
        .progress-fill {
            height: 100%;
            background: #00e67a;
            border-radius: 3px;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: #e8edf3;
            transition: all 0.2s;
        }
        .btn-sm:hover { border-color: #00e67a; color: #00e67a; }
        .btn-sm.deactivate { border-color: rgba(255,82,82,0.3); color: #ff5252; }
        .btn-sm.deactivate:hover { background: rgba(255,82,82,0.15); }
        .btn-sm.activate { border-color: rgba(0,230,122,0.3); color: #00e67a; }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: rgba(232,237,243,0.4);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00e67a;
            color: #0a0c0f;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 9999;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .admin-denied {
            text-align: center;
            padding: 120px 24px 60px;
        }
        .admin-denied h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            color: #ff5252;
            margin-bottom: 12px;
        }
        .admin-denied p { color: rgba(232,237,243,0.6); margin-bottom: 24px; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,14,39,0.85);
            backdrop-filter: blur(6px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-box h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #00e67a;
            margin-bottom: 20px;
        }
        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            background: none;
            border: none;
            color: rgba(232,237,243,0.4);
            font-size: 1.4rem;
            cursor: pointer;
        }
        .modal-close:hover { color: #e8edf3; }
        .lesson-progress-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .lesson-progress-item {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .lesson-progress-item .num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            color: #00ff88;
            opacity: 0.6;
        }
        .lesson-progress-item .pct {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e8edf3;
            margin: 4px 0;
        }
        .lesson-progress-item .bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .lesson-progress-item .bar-fill {
            height: 100%;
            background: #00e67a;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="Logo" style="height:32px; vertical-align:middle; margin-right:8px;" /> <i class="fas fa-code"></i> <span class="logo-text">Vibecoding</span>
            </a>
            <nav id="mainNav">
                <a href="course.html">Назад к урокам</a>
            </nav>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <div id="adminDenied" class="admin-denied" style="display:none;">
        <h2><i class="fas fa-lock"></i> Доступ запрещён</h2>
        <p>Эта страница доступна только администраторам.</p>
        <a href="course.html" class="btn-action" style="text-decoration:none;">Вернуться к курсу</a>
    </div>

    <div id="firstSetup" class="admin-denied" style="display:none;">
        <h2><i class="fas fa-user-shield"></i> Первичная настройка</h2>
        <p>Пользователей пока нет. Создайте первого администратора.</p>
        <form id="setupForm" onsubmit="return AdminUI.createFirstAdmin(event)" style="max-width:400px;margin:24px auto 0;text-align:left;">
            <div class="form-group" style="margin-bottom:16px;">
                <label>Email администратора</label>
                <input type="email" id="setupEmail" required placeholder="admin@example.com" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#e8edf3;font-size:0.95rem;font-family:'Inter',sans-serif;outline:none;box-sizing:border-box;">
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label>Пароль</label>
                <input type="password" id="setupPassword" required placeholder="Минимум 6 символов" minlength="6" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#e8edf3;font-size:0.95rem;font-family:'Inter',sans-serif;outline:none;box-sizing:border-box;">
            </div>
            <div id="setupError" style="color:#ff5252;font-size:0.85rem;margin-bottom:12px;min-height:1.2em;"></div>
            <button type="submit" class="btn-action" id="setupBtn" style="width:100%;">Создать администратора</button>
        </form>
    </div>

    <div id="adminPanel" class="admin-container" style="display:none;">
        <h1 class="section-title">Управление пользователями</h1>

        <div class="toolbar">
            <button class="btn-action" onclick="AdminUI.showCreateModal()"><i class="fas fa-plus"></i> Создать пользователя</button>
            <button class="btn-action btn-export" onclick="AdminUI.exportExcel()"><i class="fas fa-file-excel"></i> Скачать таблицу</button>
        </div>

        <div class="admin-card">
            <h2><i class="fas fa-users"></i> Пользователи</h2>
            <div id="usersList"></div>
        </div>
    </div>

    <!-- Create/Edit User Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-box">
            <button class="modal-close" onclick="AdminUI.closeModal()">&times;</button>
            <h3 id="userModalTitle">Создать пользователя</h3>
            <form id="userForm" onsubmit="return AdminUI.saveUser(event)">
                <input type="hidden" id="editUid">
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="userEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="text" id="userPassword" placeholder="Минимум 6 символов">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Отображаемое имя</label>
                        <input type="text" id="userLabel" placeholder="Иванов Иван">
                    </div>
                    <div class="form-group">
                        <label>Роль</label>
                        <select id="userRole">
                            <option value="student">Студент</option>
                            <option value="admin">Администратор</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Тип доступа</label>
                        <select id="userAccessType" onchange="AdminUI.toggleLessonsField()">
                            <option value="full">Полный доступ</option>
                            <option value="lesson">Конкретные уроки</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Срок действия (ISO 8601)</label>
                        <input type="text" id="userExpires" placeholder="P1M, P6M, P1Y" value="P6M">
                    </div>
                </div>
                <div class="form-row" id="lessonsRow" style="display:none;">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Номера уроков (через запятую)</label>
                        <input type="text" id="userLessons" placeholder="1, 2, 3">
                    </div>
                </div>
                <div class="form-error" id="userFormError" style="color:#ff5252;font-size:0.85rem;margin-top:8px;min-height:1.2em;"></div>
                <div style="margin-top: 20px; display: flex; gap: 12px;">
                    <button type="submit" class="btn-action" id="userFormBtn">Создать</button>
                    <button type="button" class="btn-action btn-secondary" onclick="AdminUI.closeModal()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Progress Modal -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-box">
            <button class="modal-close" onclick="AdminUI.closeProgressModal()">&times;</button>
            <h3 id="progressModalTitle">Прогресс пользователя</h3>
            <div id="progressContent"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
    <script src="js/firebase-config.js" defer></script>
    <script src="js/firestore.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script>
    const AdminUI = (() => {
        let allUsers = [];
        let editingUid = null;

        async function init() {
            await Auth.whenReady();

            let users = [];
            try {
                users = await FirestoreDB.getAllUsers();
            } catch (e) {}

            if (users.length === 0) {
                document.getElementById('adminDenied').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('firstSetup').style.display = 'block';
                return;
            }

            const user = Auth.getCurrentUser();
            const userData = Auth.getUserData();

            if (!user || !userData || userData.role !== 'admin') {
                document.getElementById('adminDenied').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('firstSetup').style.display = 'none';
                return;
            }

            document.getElementById('adminDenied').style.display = 'none';
            document.getElementById('firstSetup').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            await loadUsers();
        }

        async function createFirstAdmin(event) {
            event.preventDefault();
            const email = document.getElementById('setupEmail').value.trim();
            const password = document.getElementById('setupPassword').value;
            const errorEl = document.getElementById('setupError');
            const btn = document.getElementById('setupBtn');

            errorEl.textContent = '';
            btn.disabled = true;

            try {
                let uid;
                try {
                    const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                    uid = cred.user.uid;
                } catch (createErr) {
                    if (createErr.code === 'auth/email-already-in-use') {
                        const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
                        uid = cred.user.uid;
                    } else {
                        throw createErr;
                    }
                }

                const existingDoc = await FirestoreDB.getUser(uid);
                if (!existingDoc) {
                    await FirestoreDB.createUser(uid, {
                        email: email,
                        role: 'admin',
                        accessType: 'full',
                        lessons: [],
                        expiresAt: null,
                        label: 'Администратор'
                    });
                } else if (existingDoc.role !== 'admin') {
                    await FirestoreDB.updateUser(uid, { role: 'admin', accessType: 'full' });
                }
                window.location.reload();
            } catch (e) {
                let msg = 'Ошибка создания';
                if (e.code === 'auth/weak-password') msg = 'Пароль слишком простой';
                else if (e.code === 'auth/invalid-email') msg = 'Некорректный email';
                else if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password') msg = 'Неверный пароль для существующего аккаунта';
                else if (e.code === 'auth/too-many-requests') msg = 'Слишком много попыток. Попробуйте позже';
                else if (e.message) msg = e.message;
                errorEl.textContent = msg;
                btn.disabled = false;
            }
        }

        async function loadUsers() {
            try {
                allUsers = await FirestoreDB.getAllUsers();
                renderUsers();
            } catch (e) {
                document.getElementById('usersList').innerHTML = '<div class="empty-state">Ошибка загрузки пользователей</div>';
            }
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            if (allUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">Пользователей пока нет</div>';
                return;
            }
            let html = '<table class="users-table"><thead><tr><th>Email</th><th>Имя</th><th>Роль</th><th>Доступ</th><th>Срок</th><th>Статус</th><th>Прогресс</th><th></th></tr></thead><tbody>';
            allUsers.forEach(u => {
                const isDeactivated = u.status === 'deactivated';
                const isExpired = u.expiresAt && (u.expiresAt.toDate ? u.expiresAt.toDate() : new Date(u.expiresAt)) < new Date();
                const isActive = !isDeactivated && !isExpired;
                const expiresStr = u.expiresAt ? (u.expiresAt.toDate ? u.expiresAt.toDate().toLocaleDateString('ru-RU') : new Date(u.expiresAt).toLocaleDateString('ru-RU')) : 'Бессрочно';
                const typeLabel = u.accessType === 'lesson' ? 'Lesson [' + (u.lessons || []).join(',') + ']' : u.accessType;
                const roleClass = u.role === 'admin' ? 'admin' : u.accessType;
                const progress = u.progress || {};
                let totalPct = 0;
                for (let i = 1; i <= 9; i++) {
                    const lp = progress['lesson' + i];
                    totalPct += lp ? (lp.score || 0) : 0;
                }
                const avgPct = Math.round(totalPct / 9);

                html += '<tr>';
                html += '<td>' + (u.email || '') + '</td>';
                html += '<td>' + (u.label || '—') + '</td>';
                html += '<td><span class="type-badge ' + (u.role === 'admin' ? 'admin' : '') + '">' + u.role + '</span></td>';
                html += '<td><span class="type-badge ' + roleClass + '">' + typeLabel + '</span></td>';
                html += '<td>' + expiresStr + '</td>';
                html += '<td>' + (isActive ? '<span class="status-active">Активен</span>' : '<span class="status-deactivated">Заблокирован</span>') + '</td>';
                html += '<td><div class="progress-bar"><div class="progress-fill" style="width:' + avgPct + '%"></div></div>' + avgPct + '%</td>';
                html += '<td style="white-space:nowrap;">';
                html += '<button class="btn-sm" onclick="AdminUI.editUser(\'' + u.uid + '\')"><i class="fas fa-edit"></i></button> ';
                html += '<button class="btn-sm" onclick="AdminUI.viewProgress(\'' + u.uid + '\')"><i class="fas fa-chart-bar"></i></button> ';
                if (isActive) {
                    html += '<button class="btn-sm deactivate" onclick="AdminUI.deactivateUser(\'' + u.uid + '\')"><i class="fas fa-ban"></i></button>';
                } else {
                    html += '<button class="btn-sm activate" onclick="AdminUI.activateUser(\'' + u.uid + '\')"><i class="fas fa-check"></i></button> ';
                }
                html += '<button class="btn-sm delete" onclick="AdminUI.deleteUser(\'' + u.uid + '\')"><i class="fas fa-trash"></i></button>';
                html += '</td></tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function showCreateModal() {
            editingUid = null;
            document.getElementById('userModalTitle').textContent = 'Создать пользователя';
            document.getElementById('userFormBtn').textContent = 'Создать';
            document.getElementById('editUid').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userEmail').disabled = false;
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = true;
            document.getElementById('userLabel').value = '';
            document.getElementById('userRole').value = 'student';
            document.getElementById('userAccessType').value = 'full';
            document.getElementById('userExpires').value = 'P6M';
            document.getElementById('userLessons').value = '';
            document.getElementById('userFormError').textContent = '';
            toggleLessonsField();
            document.getElementById('userModal').classList.add('active');
        }

        function editUser(uid) {
            const u = allUsers.find(x => x.uid === uid);
            if (!u) return;
            editingUid = uid;
            document.getElementById('userModalTitle').textContent = 'Редактировать пользователя';
            document.getElementById('userFormBtn').textContent = 'Сохранить';
            document.getElementById('editUid').value = uid;
            document.getElementById('userEmail').value = u.email || '';
            document.getElementById('userEmail').disabled = true;
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = false;
            document.getElementById('userLabel').value = u.label || '';
            document.getElementById('userRole').value = u.role || 'student';
            document.getElementById('userAccessType').value = u.accessType || 'full';
            const exp = u.expiresAt ? (u.expiresAt.toDate ? u.expiresAt.toDate() : new Date(u.expiresAt)) : null;
            if (exp) {
                const diff = exp - new Date();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                document.getElementById('userExpires').value = 'P' + days + 'D';
            } else {
                document.getElementById('userExpires').value = '';
            }
            document.getElementById('userLessons').value = (u.lessons || []).join(', ');
            document.getElementById('userFormError').textContent = '';
            toggleLessonsField();
            document.getElementById('userModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function toggleLessonsField() {
            const type = document.getElementById('userAccessType').value;
            document.getElementById('lessonsRow').style.display = type === 'lesson' ? 'grid' : 'none';
        }

        async function saveUser(event) {
            event.preventDefault();
            const errorEl = document.getElementById('userFormError');
            const btn = document.getElementById('userFormBtn');
            errorEl.textContent = '';
            btn.disabled = true;

            try {
                const email = document.getElementById('userEmail').value.trim();
                const password = document.getElementById('userPassword').value;
                const label = document.getElementById('userLabel').value.trim();
                const role = document.getElementById('userRole').value;
                const accessType = document.getElementById('userAccessType').value;
                const expiresStr = document.getElementById('userExpires').value.trim();
                const lessonsStr = document.getElementById('userLessons').value.trim();

                let expiresAt = null;
                if (expiresStr && accessType !== 'admin') {
                    const ms = parseISO8601(expiresStr);
                    expiresAt = firebase.firestore.Timestamp.fromDate(new Date(Date.now() + ms));
                }

                const lessons = accessType === 'lesson' && lessonsStr
                    ? lessonsStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n >= 1 && n <= 9)
                    : [];

                if (editingUid) {
                    const updateData = { label, role, accessType, lessons, expiresAt };
                    await FirestoreDB.updateUser(editingUid, updateData);
                    showToast('Пользователь обновлён');
                } else {
                    if (!email || !password) {
                        errorEl.textContent = 'Email и пароль обязательны';
                        btn.disabled = false;
                        return;
                    }
                    if (password.length < 6) {
                        errorEl.textContent = 'Пароль минимум 6 символов';
                        btn.disabled = false;
                        return;
                    }
                    const result = await Auth.registerUser(email, password, role, accessType, lessons, expiresAt, label);
                    if (!result.success) {
                        errorEl.textContent = result.error;
                        btn.disabled = false;
                        return;
                    }
                    showToast('Пользователь создан');
                }

                closeModal();
                await loadUsers();
            } catch (e) {
                errorEl.textContent = 'Ошибка: ' + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        async function deactivateUser(uid) {
            if (!confirm('Заблокировать пользователя? Он не сможет войти в систему.')) return;
            await FirestoreDB.updateUser(uid, { status: 'deactivated' });
            showToast('Пользователь заблокирован');
            await loadUsers();
        }

        async function activateUser(uid) {
            await FirestoreDB.updateUser(uid, { status: 'active' });
            showToast('Пользователь активирован');
            await loadUsers();
        }

        function viewProgress(uid) {
            const u = allUsers.find(x => x.uid === uid);
            if (!u) return;
            document.getElementById('progressModalTitle').textContent = 'Прогресс: ' + (u.label || u.email);
            const progress = u.progress || {};
            let html = '<div class="lesson-progress-grid">';
            for (let i = 1; i <= 9; i++) {
                const lp = progress['lesson' + i];
                const pct = lp ? (lp.score || 0) : 0;
                const stepsDone = lp ? (lp.completed || []).filter(Boolean).length : 0;
                const stepsTotal = lp ? (lp.completed || []).length : 0;
                html += '<div class="lesson-progress-item">';
                html += '<div class="num">' + String(i).padStart(2, '0') + '</div>';
                html += '<div class="pct">' + pct + '%</div>';
                html += '<div class="bar"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
                html += '<div style="font-size:0.7rem;color:rgba(232,237,243,0.4);margin-top:4px;">' + stepsDone + '/' + (stepsTotal || '—') + ' шагов</div>';
                html += '</div>';
            }
            html += '</div>';
            document.getElementById('progressContent').innerHTML = html;
            document.getElementById('progressModal').classList.add('active');
        }

        function closeProgressModal() {
            document.getElementById('progressModal').classList.remove('active');
        }

        function exportExcel() {
            if (typeof XLSX === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                script.onload = function() { exportExcel(); };
                script.onerror = function() { showToast('Не удалось загрузить библиотеку Excel. Проверьте подключение к интернету.'); };
                document.head.appendChild(script);
                showToast('Загрузка библиотеки Excel...');
                return;
            }
            if (allUsers.length === 0) {
                showToast('Нет данных для экспорта');
                return;
            }
            const rows = [['Email', 'Имя', 'Роль', 'Тип доступа', 'Уроки', 'Срок', 'Статус', 'Дата создания',
                'Урок 1', 'Урок 2', 'Урок 3', 'Урок 4', 'Урок 5', 'Урок 6', 'Урок 7', 'Урок 8', 'Урок 9']];
            allUsers.forEach(u => {
                const progress = u.progress || {};
                const expires = u.expiresAt ? (u.expiresAt.toDate ? u.expiresAt.toDate().toLocaleDateString('ru-RU') : '') : 'Бессрочно';
                const created = u.createdAt ? (u.createdAt.toDate ? u.createdAt.toDate().toLocaleDateString('ru-RU') : '') : '';
                const row = [
                    u.email || '',
                    u.label || '',
                    u.role || '',
                    u.accessType || '',
                    (u.lessons || []).join(', '),
                    expires,
                    u.status === 'deactivated' ? 'Заблокирован' : 'Активен',
                    created
                ];
                for (let i = 1; i <= 9; i++) {
                    const lp = progress['lesson' + i];
                    row.push(lp ? (lp.score || 0) + '%' : '—');
                }
                rows.push(row);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Пользователи');
            XLSX.writeFile(wb, 'users_' + new Date().toISOString().slice(0, 10) + '.xlsx');
            showToast('Таблица скачана');
        }

        function parseISO8601(str) {
            const match = str.match(/^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$/);
            if (!match) return 30 * 24 * 60 * 60 * 1000;
            const years = parseInt(match[1] || 0);
            const months = parseInt(match[2] || 0);
            const days = parseInt(match[3] || 0);
            return (years * 365 + months * 30 + days) * 24 * 60 * 60 * 1000;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        return {
            init, createFirstAdmin, showCreateModal, editUser, closeModal, toggleLessonsField,
            saveUser, deactivateUser, activateUser, viewProgress, closeProgressModal,
            exportExcel
        };
    })();

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', AdminUI.init);
    } else {
        AdminUI.init();
    }
    </script>
    <script src="js/protect.js"></script>
</body>
</html>
